name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: pytest tests/test_workflow_engine.py tests/test_marketplace.py tests/test_dod_closure.py tests/test_teams.py tests/test_usage.py tests/test_google_auth.py tests/test_security.py -v
        env:
          ENV: test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: web/frontend
        run: |
          npm ci 2>/dev/null || npm install
          npm run build
