# Fly.io configuration for My Agent.
# Usage: `flyctl launch --copy-config` then `flyctl deploy`.
app = "my-agent"
primary_region = "fra"

[build]
  dockerfile = "../Dockerfile"

[env]
  ENV = "production"
  PORT = "8020"

[http_service]
  internal_port = 8020
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [[http_service.checks.http]]
      interval = "30s"
      timeout = "5s"
      grace_period = "20s"
      method = "GET"
      path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
