# Render.com Blueprint — one-click deploy.
#
# Usage:
#   1. Fork the repo on GitHub.
#   2. Visit https://render.com/deploy and paste your fork URL.
#   3. Render reads this file and provisions the web + db + redis.
#
# Notes:
#   - The free tiers spin down after 15 min idle; upgrade for production.
#   - Set OPENROUTER_API_KEY as a secret env var in the Render dashboard
#     before the first deploy (the blueprint cannot inject your secret).

services:
  - type: web
    name: my-agent
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-agent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: my-agent-redis
          type: redis
          property: connectionString
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: redis
    name: my-agent-redis
    plan: starter
    ipAllowList: []

databases:
  - name: my-agent-db
    plan: starter
    postgresMajorVersion: 16
