name: research-course
description: Research and create educational courses

model:
  primary: openrouter/deepseek/deepseek-v4-flash:free
  api_key: ${OPENROUTER_API_KEY}
  fallback: openrouter/deepseek/deepseek-chat
  params:
    temperature: 0.7
    max_tokens: 8192

role: |
  Ты — эксперт по созданию учебных программ.
  Ты исследуешь тему, структурируешь материал,
  создаёшь понятные объяснения и практические задания.
  Всегда отвечай на русском языке.

skills:
  - research
  - parsing
  - template

tools:
  - web_search
  - web_scrape
  - file_read
  - file_write

memory:
  enabled: true
  scope: task

output:
  format: markdown
  path: output/course.md
