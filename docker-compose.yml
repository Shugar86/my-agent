# My Agent — standalone stack (R&D)
# Запуск: cd /opt/projects/my-agent && docker compose up -d --build
#
# Порты на этом сервере (159.195.31.95):
#   8020 — Web UI (FastAPI + React Flow builder)
#   5437 — PostgreSQL (только localhost)
#   6380 — Redis (только localhost)
#
version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: my-agent-db
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentpass}
      POSTGRES_DB: agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: my-agent-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # n8n is optional — only enabled with `--profile demo` so it does not consume
  # resources during regular development. Provides a real n8n instance the
  # `action.n8n_webhook` node can trigger during the investor demo.
  n8n:
    image: n8nio/n8n:latest
    container_name: my-agent-n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASS:-demo}
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Moscow}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    profiles: ["demo"]
    restart: unless-stopped

  agent:
    build: .
    container_name: my-agent
    ports:
      - "127.0.0.1:8020:8020"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://agent:${POSTGRES_PASSWORD:-agentpass}@db:5432/agent_db
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command:
      [
        "python", "-m", "uvicorn", "web.server:app",
        "--host", "0.0.0.0", "--port", "8020", "--workers", "1"
      ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: my-agent-prometheus
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: my-agent-grafana
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  grafana_data:
