# DEPRECATED (2026-06): runtime uses core/configurator.py MODEL_PROFILES + config/agent.json.
# Not loaded by the application. See docs/README.md → «Устаревшее».
models:
  primary:
    model: openrouter/mistralai/mistral-large
    params:
      temperature: 0.7
      max_tokens: 8192

  fast:
    model: openai/gpt-4o-mini
    params:
      temperature: 0.5
      max_tokens: 4096

  deep_think:
    model: anthropic/claude-sonnet-4-20250514
    params:
      temperature: 0.3
      max_tokens: 16000

  local:
    model: ollama/llama3
    base_url: http://localhost:11434
    params:
      temperature: 0.7

  neuroapi:
    model: openai/gpt-5.4-nano
    api_key: "${NEUROAPI_API_KEY}"
    base_url: https://neuroapi.host/v1
    params:
      temperature: 0.7
      max_tokens: 8192

  kimi:
    model: openai/kimi-for-coding
    api_key: "${KIMI_API_KEY}"
    base_url: https://api.kimi.com/coding/v1
    params:
      temperature: 0.7
      max_tokens: 8192
