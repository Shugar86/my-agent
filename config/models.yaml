# DEPRECATED: runtime uses core/configurator.py MODEL_PROFILES + config/agent.json.
# Kept for reference only — not loaded by the application.
models:
  primary:
    model: openrouter/mistralai/mistral-large
    params:
      temperature: 0.7
      max_tokens: 8192

  fast:
    model: openai/gpt-5.4-nano
    params:
      temperature: 0.5
      max_tokens: 4096

  deep_think:
    model: anthropic/claude-sonnet-4-20250514
    params:
      temperature: 0.3
      max_tokens: 16000

  local:
    model: ollama/llama3
    base_url: http://localhost:11434
    params:
      temperature: 0.7

  neuroapi:
    model: openai/gpt-5.4-nano
    api_key: "${NEUROAPI_API_KEY}"
    base_url: https://neuroapi.host/v1
    params:
      temperature: 0.7
      max_tokens: 8192
